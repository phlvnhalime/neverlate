services:
    db:
      image: postgres:15
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}
      volumes:
        - db_data:/var/lib/postgresql/data
      ports:
        - "5432:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
        interval: 5s
        timeout: 5s
        retries: 5

    backend-python:
      build: ./backend-python
      image: neverlate-python:latest
      env_file:
        - .env
      volumes:
        - ./backend-python:/app 
      ports:
        - "8000:8000"
      depends_on:
        db:
          condition: service_healthy

    backend-node:
      build: ./backend-node
      image: neverlates-node:latest
      environment:
        DB_HOST: db
      volumes:
        - ./backend-node:/app
      ports:
       - "3000:3000"
      depends_on:
        - db

    frontend:
      build: ./frontend
      volumes:
        - ./frontend:/app
        - /app/node_modules
      ports:
        - "8080:5173"
      depends_on:
        - backend-python
        - backend-node


volumes:
  db_data:

